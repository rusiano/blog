name: Deploy MkDocs Site to Google Cloud Storage

on:
  push:
    branches:
      - main  # Trigger on changes to the main branch
  pull_request:
    branches:
      - main  # Trigger on PRs to the main branch

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'

    - name: Install MkDocs and dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mkdocs

    - name: Build MkDocs site
      run: |
        mkdocs build --clean

    - name: Upload to Google Cloud Storage
      uses: google-github-actions/upload-cloud-storage@v0
      with:
        destination: gs://${{ secrets.BUCKET_NAME }}  # Replace with your bucket name
        source: ./site/*  # This is where MkDocs places your built files
      env:
        GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GCLOUD_SERVICE_ACCOUNT_KEY }}
